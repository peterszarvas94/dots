set -sa terminal-overrides ",*256col*:Tc"
set -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "xterm-256color"

set -g default-shell /bin/zsh
set -g focus-events on

set -g base-index 1
set -g pane-base-index 1

set -g status-left ""
set -g status-position top
set -g status-right-style "bg=colour6,fg=colour0"
set -g status-right " #S "

set -g status-style "bg=colour0"
set -g window-status-current-style "bg=colour12,fg=colour0"
set -g mode-style "bg=colour10,fg=colour0"
set -g message-command-style "bg=colour11,fg=colour0"
set -g window-status-separator ""
set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W "

set -g history-limit 100000

bind b new-window -n "branch" "branch; tmux kill-window"
bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind f display-popup -w 90% -h 85% -E "tmux-sessionizer"
bind L display-popup -w 90% -h 85% -E "lazygit"
bind K display-popup -w 90% -h 85% -E "lazydocker"
